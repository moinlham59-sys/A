name: Run n.py 24/7

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'  # Restart every 6 hours (at minute 0 of every 6th hour)

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 hours (GitHub's maximum)
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install aiogram aiohttp

      - name: Run n.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: python n.py
        
